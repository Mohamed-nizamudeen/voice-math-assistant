<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Math Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>🎙️ Ai Voice Calculator: </h1>

    <!-- Input Section -->
    <div class="input-section">
      <input type="text" id="textInput" placeholder="Type your math command... e.g. add 5 and 3" />
      <button id="sendBtn">Send ➤</button>
      <button id="micBtn">🎤 Speak</button>
    </div>

    <!-- Output Section -->
    <div class="output-section">
      <p id="recognizedText">🗣️ Recognized: <span>—</span></p>
      <h2 id="result">Result: —</h2>
      <button id="speakResult">🔊 Speak Result</button>
    </div>

    <!-- History Section -->
    <div class="history-section">
      <h3>📜 History</h3>
      <button id="clearHistory">Clear</button>
      <ul id="historyList"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
